# .specfuse/verification.yml — THIS repo's own gates.
#
# Wired so the reference implementation practices the methodology it ships.
# Authored by hand (deliberately; the derive-verification skill flagged four
# gaps in a prior dogfood — see the commit that introduced this file).
#
# CI (.github/workflows/ci.yml) runs the same commands as scripts/smoke-test.sh,
# which runs the same commands declared below. If you change one, change all
# three — drift defeats the verification-as-oracle property.
#
# AUTHORING RULE: gate commands are self-contained. No `--no-build`,
# `--no-restore`, or any "skip-build" flag — see
# .specfuse/skills/verification/SKILL.md "the stale-artifact trap."

code:
  - name: tests
    command: "python3 -m unittest discover -s tests -v"

  - name: lint
    command: "ruff check specfuse .specfuse/scripts tests scripts"

  - name: security
    # -ll = report only medium+ severity. The one high-severity finding
    # (shell=True in verify()'s gate-command runner) is suppressed with a
    # narrow `# nosec B602` and a reason — gate commands are user-authored
    # config that requires shell parsing by design. The driver code lives in
    # the specfuse/ package (FEAT-2026-0019); .specfuse/scripts/ holds shims.
    command: "bandit -r specfuse .specfuse/scripts -ll"

  - name: coverage
    # --fail-under=90 matches the methodology default. Measure the canonical
    # package (specfuse/), not the .specfuse/scripts/ shims.
    command: "coverage run --source=specfuse -m unittest discover -s tests && coverage report --fail-under=90"

  - name: leak-scan
    # FEAT-2026-0020/T16 leak-prevention guard, CI surface. Denylist
    # (gitignored literals) + gitleaks secrets over all tracked files. The
    # pre-commit hook (.specfuse/hooks/pre-commit) runs the full structural
    # scan on the staged diff; this gate is the can't-bypass backstop.
    command: "python3 .specfuse/scripts/leak_scan.py --all"

  - name: leak-scan-hook
    # §11 operator-script gate: the pre-commit hook's bats happy-path.
    command: "bats tests/leak_scan_hook.bats"

  - name: sync-scaffold-bats
    # §11 operator-script gate: sync-scaffold.sh happy-path via bats.
    # The drift-guard test (test_scaffold_data_in_sync.py) runs under 'tests'.
    command: "bats tests/sync_scaffold.bats"

  # warnings: CONSCIOUSLY DROPPED.
  # Python has no compiler-warnings analogue; this gate assumes a compiled
  # stack (warnings-as-errors at build time) and is N/A for a pure-Python
  # project. Forcing `python -W error` would conflate runtime warnings with
  # compiler warnings — symmetry-chasing the methodology cautions against.
  # When this repo grows a compiled extension, restore the gate.

# Reflective units (retrospective, lessons, docs): the artifact exists / something
# changed. Carried through from verification.yml.example.
doc:
  - name: artifact-changed
    command: "git -C {feature_dir} diff --quiet HEAD -- . && exit 1 || exit 0"

# plan-next: structural integrity of what it drafted. Carried through.
plannext:
  - name: plan-lint
    command: "python3 .specfuse/scripts/lint_plan.py {feature_dir}"
