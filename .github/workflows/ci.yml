# Minimal CI: run the repo's smoke test (lint + driver dry-run) on push and PR.

name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run smoke test
        run: ./scripts/smoke-test.sh
