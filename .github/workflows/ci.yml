#
# CI: run the repo's scaffold smoke-test PLUS the methodology `code` gates
# (tests, lint, security, coverage) on push and PR. The script does both —
# this workflow just sets up Python and invokes it. The gate commands here
# are intentionally the same ones declared in .specfuse/verification.yml
# and run by scripts/smoke-test.sh; keep all three in sync.

name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime + dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Install gitleaks + bats (leak-scan gate)
        run: |
          sudo apt-get update
          sudo apt-get install -y bats gitleaks || {
            # gitleaks not in apt on all runners — fall back to the release binary.
            curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
              | sudo tar -xz -C /usr/local/bin gitleaks
          }

      - name: Run scaffold smoke-test + code gates
        run: ./scripts/smoke-test.sh

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Import driver module
        run: python -c "import specfuse.loop.loop"

      - name: Dry-run walk the bundled example
        run: python .specfuse/scripts/loop.py --feature FEAT-2026-0001-health-endpoint --dry-run
