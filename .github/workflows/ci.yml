#
# CI: run the repo's scaffold smoke-test PLUS the methodology `code` gates
# (tests, lint, security, coverage) on push and PR. The script does both —
# this workflow just sets up Python and invokes it. The gate commands here
# are intentionally the same ones declared in .specfuse/verification.yml
# and run by scripts/smoke-test.sh; keep all three in sync.

name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime + dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run scaffold smoke-test + code gates
        run: ./scripts/smoke-test.sh
