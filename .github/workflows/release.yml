#
# Release: on a `v*` tag, build the wheel + sdist, run the full test suite against
# the BUILT artifact (not the source tree), then publish to PyPI via OIDC trusted
# publishing. No API tokens — the trusted publisher must be configured on PyPI for
# project `specfuse-loop` (operator one-time setup). The build + test job always
# runs; publish only runs on a tag and only if build+test passed.

name: release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch:   # manual build/test without publishing (no tag → publish skipped)

jobs:
  build-test:
    runs-on: ubuntu-latest
    outputs:
      is_tag: ${{ startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install gitleaks (leak-scan tests in the suite need it)
        run: |
          sudo apt-get update
          sudo apt-get install -y gitleaks || {
            curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
              | sudo tar -xz -C /usr/local/bin gitleaks
          }

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify the built wheel imports and exposes the console scripts
        run: |
          python -m venv /tmp/relenv
          /tmp/relenv/bin/python -m pip install --upgrade pip
          # Install the just-built wheel (with dev extras for the test run).
          WHEEL=$(ls dist/*.whl)
          /tmp/relenv/bin/python -m pip install "${WHEEL}[dev]"
          /tmp/relenv/bin/python -c "from specfuse.loop import loop, lint_plan, gate_eval; print('import OK', loop.DRIVER_VERSION)"
          /tmp/relenv/bin/specfuse-loop --help >/dev/null
          /tmp/relenv/bin/specfuse-lint --help >/dev/null

      - name: Run the full test suite against the installed wheel
        run: |
          # Run from a clean dir so tests import the INSTALLED package, not ./specfuse.
          /tmp/relenv/bin/python -m pip install --upgrade pip
          /tmp/relenv/bin/python -m unittest discover -s tests -v

      - name: Tag/version agreement check
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          DRV=$(python -c "import re;print(re.search(r'DRIVER_VERSION\s*=\s*\"([^\"]+)\"',open('specfuse/loop/loop.py').read()).group(1))")
          echo "tag=$TAG pyproject=$PKG driver=$DRV"
          test "$TAG" = "$PKG" || { echo "::error::tag v$TAG != pyproject version $PKG"; exit 1; }
          test "$TAG" = "$DRV" || { echo "::error::tag v$TAG != DRIVER_VERSION $DRV"; exit 1; }

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish:
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC — required for trusted publishing; no API token
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
